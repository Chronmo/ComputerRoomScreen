services:
  mysql:
    image: mysql:8.4
    container_name: computer-room-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: computer_room_screen
      MYSQL_USER: screen
      MYSQL_PASSWORD: screen_password
      TZ: Asia/Shanghai
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 5s
      timeout: 5s
      retries: 30

  importer:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: computer_room_screen
      MYSQL_USER: screen
      MYSQL_PASSWORD: screen_password
    depends_on:
      mysql:
        condition: service_healthy
    command: ["node", "scripts/import-to-mysql.mjs"]
    restart: "no"

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      API_PORT: 3000
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: computer_room_screen
      MYSQL_USER: screen
      MYSQL_PASSWORD: screen_password
    depends_on:
      mysql:
        condition: service_healthy
      importer:
        condition: service_completed_successfully
    ports:
      - "3000:3000"

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    depends_on:
      - api
    ports:
      - "8080:80"

volumes:
  mysql_data:
